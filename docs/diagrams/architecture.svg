<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 750" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="1400" height="750" rx="12" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#1e1e1e"/>
    </marker>
    <marker id="arr-spark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#E25A1C"/>
    </marker>
    <marker id="arr-s3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#FF9900"/>
    </marker>
    <marker id="arr-elastic" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#005571"/>
    </marker>
    <marker id="arr-pg" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#336791"/>
    </marker>
    <marker id="arr-kibana" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#E8478B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#1e1e1e">SkySafe — Architecture du Pipeline Big Data</text>
  <text x="700" y="50" text-anchor="middle" font-size="12" fill="#666">Surveillance du trafic aerien francais en temps reel</text>

  <!-- ===== DATA SOURCES ZONE ===== -->
  <rect x="50" y="65" width="740" height="120" rx="10" fill="#d3f9d8" fill-opacity="0.35" stroke="#22c55e" stroke-width="1"/>
  <text x="62" y="82" font-size="11" fill="#15803d" font-weight="700" letter-spacing="1">SOURCES DE DONNEES</text>

  <!-- OpenSky API box -->
  <rect x="70" y="92" width="310" height="34" rx="6" fill="#c3fae8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="225" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">OpenSky Network API</text>
  <!-- Annotation BELOW box -->
  <text x="225" y="142" text-anchor="middle" font-size="10" fill="#15803d">ICAO24, lat/lon, altitude, vitesse</text>

  <!-- Scaleway Proxy -->
  <rect x="100" y="152" width="250" height="24" rx="5" fill="#e9d5ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="225" y="168" text-anchor="middle" font-size="11" fill="#6d28d9">Scaleway Serverless Proxy</text>

  <!-- Open-Meteo API box -->
  <rect x="440" y="92" width="330" height="34" rx="6" fill="#c3fae8" stroke="#22c55e" stroke-width="1.5"/>
  <text x="605" y="114" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">Open-Meteo API</text>
  <!-- Annotation BELOW box -->
  <text x="605" y="142" text-anchor="middle" font-size="10" fill="#15803d">6 stations FR: CDG, Toulouse, Lyon, Marseille, Nantes, Lille</text>

  <!-- ===== ORCHESTRATION ZONE ===== -->
  <rect x="50" y="205" width="740" height="80" rx="10" fill="#dbe4ff" fill-opacity="0.4" stroke="#017CEE" stroke-width="1"/>
  <text x="62" y="222" font-size="11" fill="#017CEE" font-weight="700" letter-spacing="1">ORCHESTRATION</text>

  <rect x="270" y="232" width="300" height="50" rx="6" fill="#a5d8ff" stroke="#017CEE" stroke-width="1.5"/>
  <text x="420" y="254" text-anchor="middle" font-size="16" font-weight="600" fill="#1e1e1e">Apache Airflow :8080</text>
  <text x="420" y="272" text-anchor="middle" font-size="10" fill="#017CEE">DAG 4 etapes — cron toutes les minutes</text>

  <!-- Arrows: Sources → Airflow (vertical with elbow) -->
  <polyline points="225,176 225,195 370,195 370,232" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>
  <polyline points="605,126 605,195 470,195 470,232" fill="none" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== PROCESSING ZONE (Spark) ===== -->
  <rect x="50" y="310" width="740" height="180" rx="10" fill="#fff0e6" fill-opacity="0.4" stroke="#E25A1C" stroke-width="1"/>
  <text x="62" y="327" font-size="11" fill="#E25A1C" font-weight="700" letter-spacing="1">TRAITEMENT (Apache Spark / PySpark)</text>

  <!-- Format boxes -->
  <rect x="80" y="355" width="290" height="34" rx="6" fill="#fed7aa" stroke="#E25A1C" stroke-width="1.5"/>
  <text x="225" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">format_flights_spark</text>

  <rect x="420" y="355" width="290" height="34" rx="6" fill="#fed7aa" stroke="#E25A1C" stroke-width="1.5"/>
  <text x="565" y="377" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">format_weather_spark</text>

  <!-- Annotations BELOW format boxes -->
  <text x="225" y="405" text-anchor="middle" font-size="9" fill="#92400e">Type casting, filtrage GPS, normalisation UTC</text>
  <text x="565" y="405" text-anchor="middle" font-size="9" fill="#92400e">Type casting, normalisation UTC</text>

  <!-- Arrows: Airflow → Format (vertical elbows routed around boxes) -->
  <!-- Left: Airflow center-left goes down, then bends left to format_flights -->
  <polyline points="370,270 370,295 225,295 225,355" fill="none" stroke="#E25A1C" stroke-width="2" marker-end="url(#arr-spark)"/>
  <!-- Right: Airflow center-right goes down, then bends right to format_weather -->
  <polyline points="470,270 470,295 565,295 565,355" fill="none" stroke="#E25A1C" stroke-width="2" marker-end="url(#arr-spark)"/>

  <!-- Combine layer -->
  <rect x="200" y="420" width="400" height="38" rx="6" fill="#fed7aa" stroke="#E25A1C" stroke-width="1.5"/>
  <text x="400" y="444" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">combine_data_spark</text>

  <!-- Arrows: Format → Combine (vertical elbows) -->
  <polyline points="225,389 225,410 320,410 320,420" fill="none" stroke="#E25A1C" stroke-width="1.5" marker-end="url(#arr-spark)"/>
  <polyline points="565,389 565,410 480,410 480,420" fill="none" stroke="#E25A1C" stroke-width="1.5" marker-end="url(#arr-spark)"/>

  <!-- Combine details BELOW -->
  <text x="400" y="475" text-anchor="middle" font-size="9" fill="#92400e">Jointure spatiale Haversine | Risk Score 0-100 | K-Means 3 phases | Anomalies (mu + 2 sigma)</text>

  <!-- ===== MLlib sidebar ===== -->
  <rect x="830" y="310" width="240" height="180" rx="10" fill="#fff0e6" fill-opacity="0.28" stroke="#E25A1C" stroke-width="1"/>
  <text x="842" y="327" font-size="11" fill="#E25A1C" font-weight="700" letter-spacing="1">SPARK MLlib</text>
  <rect x="850" y="342" width="200" height="28" rx="5" fill="#fed7aa" stroke="#E25A1C" stroke-width="1"/>
  <text x="950" y="361" text-anchor="middle" font-size="12" fill="#1e1e1e">K-Means (3 clusters)</text>
  <text x="950" y="387" text-anchor="middle" font-size="10" fill="#92400e">Takeoff/Landing</text>
  <text x="950" y="401" text-anchor="middle" font-size="10" fill="#92400e">Climb/Descent</text>
  <text x="950" y="415" text-anchor="middle" font-size="10" fill="#92400e">Cruise</text>

  <rect x="850" y="430" width="200" height="28" rx="5" fill="#fed7aa" stroke="#E25A1C" stroke-width="1"/>
  <text x="950" y="449" text-anchor="middle" font-size="12" fill="#1e1e1e">Anomaly Detection</text>
  <text x="950" y="472" text-anchor="middle" font-size="10" fill="#92400e">mu + 2 sigma threshold</text>

  <!-- Dashed arrow: combine → MLlib (RIGHT from combine box, routed outside TRAITEMENT zone) -->
  <polyline points="600,439 800,439 800,400 830,400" fill="none" stroke="#E25A1C" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-spark)"/>

  <!-- ===== STORAGE ZONE (S3 Medallion) ===== -->
  <rect x="50" y="515" width="740" height="90" rx="10" fill="#fff8e1" fill-opacity="0.4" stroke="#FF9900" stroke-width="1"/>
  <text x="62" y="532" font-size="11" fill="#b45309" font-weight="700" letter-spacing="1">STOCKAGE — Amazon S3 (Medallion Architecture)</text>

  <rect x="75" y="545" width="150" height="44" rx="6" fill="#ffe0b2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="150" y="566" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">raw/</text>
  <text x="150" y="581" text-anchor="middle" font-size="9" fill="#92400e">JSON brut</text>

  <rect x="250" y="545" width="150" height="44" rx="6" fill="#ffe0b2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="325" y="566" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">formatted/</text>
  <text x="325" y="581" text-anchor="middle" font-size="9" fill="#92400e">Parquet type</text>

  <rect x="425" y="545" width="150" height="44" rx="6" fill="#ffe0b2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="500" y="566" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">enriched/</text>
  <text x="500" y="581" text-anchor="middle" font-size="9" fill="#92400e">Parquet enrichi</text>

  <rect x="600" y="545" width="150" height="44" rx="6" fill="#ffe0b2" stroke="#FF9900" stroke-width="1.5"/>
  <text x="675" y="566" text-anchor="middle" font-size="13" font-weight="600" fill="#1e1e1e">usage/</text>
  <text x="675" y="581" text-anchor="middle" font-size="9" fill="#92400e">Parquet final</text>

  <!-- Arrows between S3 layers -->
  <line x1="225" y1="567" x2="250" y2="567" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arr-s3)"/>
  <line x1="400" y1="567" x2="425" y2="567" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arr-s3)"/>
  <line x1="575" y1="567" x2="600" y2="567" stroke="#FF9900" stroke-width="1.5" marker-end="url(#arr-s3)"/>

  <!-- Arrow: Spark → S3 (vertical, clear gap) -->
  <line x1="400" y1="490" x2="400" y2="515" stroke="#1e1e1e" stroke-width="2" marker-end="url(#arr)"/>

  <!-- ===== INDEXING & VISUALIZATION ZONE ===== -->
  <rect x="50" y="630" width="740" height="80" rx="10" fill="#e0f2f1" fill-opacity="0.4" stroke="#005571" stroke-width="1"/>
  <text x="62" y="647" font-size="11" fill="#005571" font-weight="700" letter-spacing="1">INDEXATION &amp; VISUALISATION</text>

  <rect x="80" y="655" width="270" height="42" rx="6" fill="#b2dfdb" stroke="#005571" stroke-width="1.5"/>
  <text x="215" y="676" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Elasticsearch :9200</text>
  <text x="215" y="690" text-anchor="middle" font-size="9" fill="#005571">Bulk upsert ICAO24, geo_point mapping</text>

  <rect x="420" y="655" width="270" height="42" rx="6" fill="#f8bbd0" stroke="#E8478B" stroke-width="1.5"/>
  <text x="555" y="676" text-anchor="middle" font-size="15" font-weight="600" fill="#1e1e1e">Kibana :5601</text>
  <text x="555" y="690" text-anchor="middle" font-size="9" fill="#E8478B">Carte, histogrammes, pie phases, table</text>

  <!-- Arrow: S3 → Elasticsearch (vertical) -->
  <polyline points="215,605 215,655" fill="none" stroke="#005571" stroke-width="2" marker-end="url(#arr-elastic)"/>

  <!-- Arrow: Elasticsearch → Kibana -->
  <line x1="350" y1="676" x2="420" y2="676" stroke="#E8478B" stroke-width="2" marker-end="url(#arr-kibana)"/>

  <!-- ===== POSTGRESQL SIDEBAR ===== -->
  <rect x="830" y="515" width="240" height="90" rx="10" fill="#e8eaf6" fill-opacity="0.4" stroke="#336791" stroke-width="1"/>
  <text x="842" y="532" font-size="11" fill="#336791" font-weight="700" letter-spacing="1">METADONNEES</text>
  <rect x="850" y="545" width="200" height="38" rx="6" fill="#c5cae9" stroke="#336791" stroke-width="1.5"/>
  <text x="950" y="569" text-anchor="middle" font-size="14" font-weight="600" fill="#1e1e1e">PostgreSQL :5432</text>
  <text x="950" y="595" text-anchor="middle" font-size="10" fill="#336791">Airflow metadata DB</text>

  <!-- Dashed arrow: Airflow → PostgreSQL (RIGHT from Airflow box, routed outside main zones) -->
  <polyline points="570,251 800,251 800,564 830,564" fill="none" stroke="#336791" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-pg)"/>

  <!-- ===== KIBANA DASHBOARD DETAIL ===== -->
  <rect x="830" y="630" width="240" height="90" rx="10" fill="#fce4ec" fill-opacity="0.4" stroke="#E8478B" stroke-width="1"/>
  <text x="842" y="647" font-size="11" fill="#E8478B" font-weight="700" letter-spacing="1">DASHBOARD KIBANA</text>
  <text x="950" y="668" text-anchor="middle" font-size="10" fill="#1e1e1e">Carte interactive des vols</text>
  <text x="950" y="683" text-anchor="middle" font-size="10" fill="#1e1e1e">Histogrammes altitude/vitesse</text>
  <text x="950" y="698" text-anchor="middle" font-size="10" fill="#1e1e1e">Pie chart phases de vol</text>
  <text x="950" y="713" text-anchor="middle" font-size="10" fill="#1e1e1e">Table filtrable ICAO24</text>

  <!-- Dashed arrow: Kibana → Dashboard detail (goes RIGHT) -->
  <polyline points="690,676 760,676 760,675 830,675" fill="none" stroke="#E8478B" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr-kibana)"/>

  <!-- ===== FLOW LABEL ===== -->
  <text x="700" y="740" text-anchor="middle" font-size="11" fill="#999">OpenSky + Open-Meteo → Airflow → Spark → S3 (raw → formatted → enriched → usage) → Elasticsearch → Kibana</text>
</svg>